name: Push Notifications

on:
  schedule:
    # 07:00 CET (= 06:00 UTC winter, 05:00 UTC summer — use 06:00 as compromise)
    - cron: '0 6 * * *'
    # Hourly deterioration check
    - cron: '0 * * * *'
  workflow_dispatch:
    inputs:
      morning_run:
        description: 'Force morning notification'
        required: false
        default: 'false'

jobs:
  notify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install web-push
        run: npm install web-push --no-save

      - name: Run notification check
        env:
          VAPID_PUBLIC_KEY:  ${{ secrets.VAPID_PUBLIC_KEY }}
          VAPID_PRIVATE_KEY: ${{ secrets.VAPID_PRIVATE_KEY }}
          VAPID_EMAIL:       ${{ secrets.VAPID_EMAIL }}
          GIST_TOKEN:        ${{ secrets.GIST_TOKEN }}
          GIST_ID:           ${{ secrets.GIST_ID }}
          MORNING_RUN: ${{ github.event.schedule == '0 6 * * *' || (github.event_name == 'workflow_dispatch' && github.event.inputs.morning_run == 'true') }}
        run: node scripts/check-and-notify.js
